<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة المخازن - Foodie</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            background: white;
            padding: 16px 18px 22px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }
        .header .logo {
            width: 100px;
            height: 100px;
            border-radius: 0;
            object-fit: contain;
            border: none;
            box-shadow: none;
            background: transparent;
        }
        .header .logo-placeholder {
            width: 100px;
            height: 100px;
            border-radius: 0;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #94a3b8;
        }
        .header .title-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header .title-group h1 {
            color: #0f172a;
            font-weight: 700;
            font-size: 28px;
            line-height: 1.2;
        }
        .header .title-group h1 .foodie {
            color: #ef4444;
            font-style: italic;
            font-weight: 800;
            font-size: 30px;
        }
        .header .title-group .sub-title {
            color: #94a3b8;
            font-size: 12px;
            letter-spacing: 2px;
        }

        .subhead {
            text-align: center;
            color: #64748b;
            font-size: 12px;
            margin-bottom: 16px;
            border-bottom: 2px dashed #e9edf2;
            padding-bottom: 10px;
        }
        .status-badge {
            display: inline-block;
            font-size: 10px;
            padding: 2px 12px;
            border-radius: 40px;
            margin-right: 6px;
        }
        .status-badge.online { background: #10b981; color: white; }
        .status-badge.offline { background: #ef4444; color: white; }
        .status-badge.connecting { background: #f59e0b; color: white; }

        .sheet-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding: 8px 12px;
            background: #f8fafc;
            border-radius: 12px;
            flex-wrap: wrap;
        }
        .sheet-selector label {
            font-weight: 500;
            font-size: 13px;
            color: #1e293b;
        }
        .sheet-selector select {
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #d1d9e6;
            font-size: 12px;
            height: 32px;
            background: white;
            outline: none;
            min-width: 120px;
        }
        .sheet-selector select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.10);
        }
        .sheet-selector .sheet-info {
            font-size: 11px;
            color: #64748b;
            margin-right: auto;
        }

        .main-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .main-buttons .btn {
            min-width: 140px;
            height: 44px;
            font-size: 15px;
            font-weight: 700;
        }
        .btn-search-main { background: #3b82f6; color: white; border-color: #3b82f6; }
        .btn-search-main:hover:not(:disabled) { background: #2563eb; }
        .btn-add-main { background: #10b981; color: white; border-color: #10b981; }
        .btn-add-main:hover:not(:disabled) { background: #059669; }
        .btn-withdraw-main { background: #ef4444; color: white; border-color: #ef4444; }
        .btn-withdraw-main:hover:not(:disabled) { background: #dc2626; }

        .section-box {
            display: none;
            margin-top: 10px;
            padding: 16px;
            background: #f8fafc;
            border-radius: 16px;
            border: 2px solid #e2e8f0;
        }
        .section-box.active {
            display: block;
        }
        .section-box .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .section-box .section-header h3 {
            color: #0f172a;
            font-size: 16px;
        }
        .section-box .section-header .close-section {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #94a3b8;
            transition: 0.2s;
        }
        .section-box .section-header .close-section:hover {
            color: #ef4444;
        }

        .input-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 5px 4px;
            margin-bottom: 8px;
        }
        .input-group label {
            font-weight: 500;
            color: #1e293b;
            font-size: 12px;
            min-width: 38px;
        }
        .input-group input {
            flex: 1 1 90px;
            padding: 3px 10px;
            border: 1px solid #d1d9e6;
            border-radius: 30px;
            font-size: 12px;
            background: white;
            outline: none;
            transition: 0.2s;
            height: 32px;
            line-height: 1.2;
        }
        .input-group input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.10); }
        .input-group.search-input input { height: 32px; padding: 3px 12px; }

        .btn {
            border: none;
            padding: 4px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            transition: 0.2s;
            height: 32px;
            white-space: nowrap;
            border: 1px solid transparent;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: #3b82f6; color: white; border-color: #3b82f6; }
        .btn-primary:hover:not(:disabled) { background: #2563eb; }
        .btn-success { background: #10b981; color: white; border-color: #10b981; }
        .btn-success:hover:not(:disabled) { background: #059669; }
        .btn-danger { background: #ef4444; color: white; border-color: #ef4444; }
        .btn-danger:hover:not(:disabled) { background: #dc2626; }
        .btn-outline { background: transparent; border: 1px solid #cbd5e1; color: #1e293b; }
        .btn-outline:hover:not(:disabled) { background: #f1f5f9; }
        .btn-sm { padding: 2px 10px; font-size: 11px; height: 28px; }
        .btn-lg { height: 40px; padding: 6px 24px; font-size: 14px; }
        .btn-warning { background: #f59e0b; color: white; border-color: #f59e0b; }
        .btn-warning:hover:not(:disabled) { background: #d97706; }

        .table-wrap {
            overflow-x: auto;
            margin-top: 10px;
            border-radius: 14px;
            border: 1px solid #e9edf2;
        }
        table { width: 100%; border-collapse: collapse; font-size: 12px; background: white; }
        th { background: #f8fafc; color: #1e293b; font-weight: 600; padding: 8px 6px; text-align: center; border-bottom: 2px solid #e2e8f0; font-size: 11px; }
        td { padding: 8px 6px; text-align: center; border-bottom: 1px solid #edf2f7; font-size: 12px; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8fafc; }
        .empty-row td { color: #94a3b8; padding: 16px 10px; font-style: italic; }
        
        .badge { 
            padding: 2px 12px; 
            border-radius: 40px; 
            font-weight: 600; 
            font-size: 12px; 
            display: inline-block;
            min-width: 40px;
        }
        .badge-red { background: #fee2e2; color: #dc2626; }
        .badge-yellow { background: #fef3c7; color: #d97706; }
        .badge-green { background: #d1fae5; color: #059669; }
        .badge-blue { background: #dbeafe; color: #2563eb; }
        
        .action-cell { display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; }

        .loading { text-align: center; padding: 30px; color: #64748b; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .toast {
            background: #0f172a;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 13px;
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            white-space: nowrap;
            max-width: 90%;
        }
        .toast.show { opacity: 1; bottom: 30px; }
        .toast.error { background: #dc2626; }
        .toast.success { background: #059669; }

        .footer-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            border-top: 1px solid #e9edf2;
            padding-top: 14px;
        }
        .footer-actions .left-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .stat-box {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #475569;
        }
        .stat-box span strong {
            color: #0f172a;
        }

        /* ===== حقول الإضافة والسحب - حجم مناسب ===== */
        .multi-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin: 10px 0;
            padding: 10px;
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        .multi-fields .field-item {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 1px 0;
        }
        .multi-fields .field-item label {
            font-size: 13px;
            font-weight: 700;
            color: #0f172a;
            min-width: 22px;
            text-align: center;
        }
        .multi-fields .field-item input[type="text"] {
            flex: 1;
            min-width: 0;
            padding: 4px 8px;
            border: 1px solid #d1d9e6;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 700;
            height: 30px;
            outline: none;
            background: #fafcff;
            transition: 0.2s;
            color: #0f172a;
        }
        .multi-fields .field-item input[type="text"]:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.12);
            background: white;
        }
        .multi-fields .field-item .qty-input {
            width: 65px;
            min-width: 55px;
            max-width: 75px;
            text-align: center;
            font-size: 14px !important;
            font-weight: 700 !important;
            background: #f8fafc;
            padding: 4px 4px;
        }
        .multi-fields .field-item .qty-input:focus {
            background: white;
        }
        /* حقل المادة - ياخذ المساحة المتبقية */
        .multi-fields .field-item .name-input {
            min-width: 60px;
        }

        .footer-text {
            text-align: center;
            color: #94a3b8;
            font-size: 13px;
            margin-top: 18px;
            padding-top: 14px;
            border-top: 1px solid #e9edf2;
        }
        .footer-text .heart {
            color: #ef4444;
        }

        @media (max-width: 700px) {
            .multi-fields {
                grid-template-columns: 1fr;
            }
            .multi-fields .field-item .qty-input {
                width: 70px;
                min-width: 60px;
                max-width: 80px;
            }
        }
        @media (max-width: 600px) {
            .container { padding: 12px; }
            .input-group { flex-direction: column; align-items: stretch; }
            .input-group label { min-width: unset; }
            .btn { width: 100%; justify-content: center; height: 34px; }
            .toast { white-space: normal; max-width: 90%; }
            .sheet-selector { flex-direction: column; align-items: stretch; }
            .sheet-selector .sheet-info { margin-right: 0; }
            .footer-actions { flex-direction: column; align-items: stretch; }
            .footer-actions .left-actions { flex-direction: column; }
            .multi-fields {
                grid-template-columns: 1fr;
            }
            .multi-fields .field-item .qty-input {
                width: 70px;
                min-width: 60px;
            }
            .main-buttons .btn {
                min-width: 80px;
                font-size: 12px;
                height: 36px;
            }
            .header .title-group h1 {
                font-size: 20px;
            }
            .header .title-group h1 .foodie {
                font-size: 22px;
            }
            .header .logo {
                width: 70px;
                height: 70px;
            }
            .header .logo-placeholder {
                width: 70px;
                height: 70px;
                font-size: 34px;
            }
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <div class="header">
        <img class="logo" 
             src="https://h.top4top.io/p_3829zl6ne1.jpeg" 
             alt="Foodie Logo"
             @error="showLogoPlaceholder = true"
             v-if="!showLogoPlaceholder">
        <div class="logo-placeholder" v-else>🍽️</div>
        <div class="title-group">
            <h1>نظام إدارة مخازن <span class="foodie">Foodie</span></h1>
            <span class="sub-title">مدير المخزن ابو غيث</span>
        </div>
    </div>

    <div class="subhead">
        🔗 Google Sheets
        <span class="status-badge" :class="statusClass">{{ statusText }}</span>
        <button v-if="apiStatus === 'offline'" class="btn btn-warning btn-sm" @click="loadItems" style="margin-right:10px;">🔄 إعادة محاولة</button>
    </div>

    <div class="sheet-selector">
        <label>📂 الورقة:</label>
        <select v-model="selectedSheet" @change="loadItems" :disabled="loading">
            <option value="all">🌐 جميع الأوراق</option>
            <option value="Sheet1">📋 Sheet1</option>
            <option value="Sheet2">📋 Sheet2</option>
            <option value="Sheet3">📋 Sheet3</option>
            <option value="Sheet4">📋 Sheet4</option>
        </select>
        <span class="sheet-info" v-if="selectedSheet !== 'all'">عرض بيانات: <strong>{{ selectedSheet }}</strong></span>
        <span class="sheet-info" v-else>عرض: <strong>جميع الأوراق</strong></span>
        <button class="btn btn-outline btn-sm" @click="loadItems" :disabled="loading">🔄 تحديث</button>
    </div>

    <div class="main-buttons">
        <button class="btn btn-search-main" @click="showSearch" :disabled="loading">🔍 بحث</button>
        <button class="btn btn-add-main" @click="showAdd" :disabled="loading || apiStatus === 'offline'">➕ إضافة</button>
        <button class="btn btn-withdraw-main" @click="showWithdraw" :disabled="loading || apiStatus === 'offline'">➖ سحب</button>
    </div>

    <div v-if="loading" class="loading">
        <div class="spinner"></div> جاري تحميل البيانات...
    </div>

    <div v-else-if="apiStatus === 'offline'" class="loading" style="background:#fef2f2; border-radius:12px; padding:20px; border:1px solid #fecaca;">
        <div style="font-size:30px; margin-bottom:10px;">📡</div>
        <h3 style="color:#dc2626;">فشل الاتصال بقاعدة البيانات</h3>
        <p style="color:#64748b; font-size:13px; margin-top:5px;">تأكد من اتصال الإنترنت، أو أن السكربت منشور بشكل صحيح.</p>
        <button class="btn btn-warning" @click="loadItems" style="margin-top:10px; background:#f59e0b; color:white; border-color:#f59e0b;">🔄 إعادة المحاولة</button>
    </div>

    <template v-else>
        <!-- قسم البحث -->
        <div id="searchSection" class="section-box active">
            <div class="section-header">
                <h3>🔍 بحث عن المواد</h3>
                <button class="close-section" @click="closeAllSections">✕</button>
            </div>
            <div class="input-group search-input">
                <label>🔎</label>
                <input type="text" placeholder="اكتب اسم المادة..." v-model="searchTerm" @keyup.enter="searchItems">
                <button class="btn btn-primary" @click="searchItems">بحث</button>
                <button class="btn btn-outline" @click="clearSearch">إلغاء</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>اسم المادة</th>
                            <th>العدد</th>
                            <th v-if="selectedSheet === 'all'">الورقة</th>
                            <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr v-if="filteredItems.length === 0">
                            <td :colspan="selectedSheet === 'all' ? 5 : 4" class="empty-row">لا توجد مواد</td>
                        </tr>
                        <tr v-for="(item, index) in filteredItems" :key="item.id + '_' + item.sheet">
                            <td>{{ index + 1 }}</td>
                            <td><strong>{{ item.name }}</strong></td>
                            <td>
                                <span class="badge" :class="getQuantityClass(item.quantity)">
                                    {{ Number(item.quantity).toFixed(2) }}
                                </span>
                            </td>
                            <td v-if="selectedSheet === 'all'">
                                <span style="font-size:10px; background:#e9edf2; padding:2px 8px; border-radius:12px;">{{ item.sheet || 'غير محدد' }}</span>
                            </td>
                            <td class="action-cell">
                                <button class="btn btn-outline btn-sm" @click="editItem(item)" :disabled="saving">✏️</button>
                                <button class="btn btn-danger btn-sm" @click="deleteItem(item)" :disabled="saving">🗑️</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="stat-box" style="margin-top:10px;">
                <span>المواد: <strong>{{ filteredItems.length }}</strong></span>
                <span>الوحدات: <strong>{{ totalUnits.toFixed(2) }}</strong></span>
                <span v-if="selectedSheet !== 'all'">الورقة: <strong>{{ selectedSheet }}</strong></span>
            </div>
        </div>

        <!-- ===== قسم الإضافة - 16 حقلاً ===== -->
        <div id="addSection" class="section-box">
            <div class="section-header">
                <h3>➕ إضافة 16 مادة دفعة واحدة</h3>
                <button class="close-section" @click="closeAllSections">✕</button>
            </div>
            <div class="multi-fields">
                <div v-for="i in 16" :key="'add_' + i" class="field-item">
                    <label>{{ i }}.</label>
                    <input type="text" class="name-input" :placeholder="'مادة ' + i" v-model="addItems[i-1].name">
                    <input type="text" class="qty-input" placeholder="الكمية" v-model="addItems[i-1].quantity" 
                           @input="validateDecimal($event, 'add', i-1)">
                </div>
            </div>
            <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:6px;">
                <button class="btn btn-success btn-lg" @click="addMultipleItems" :disabled="saving">
                    {{ saving ? 'جاري الإضافة...' : '➕ إضافة الكل' }}
                </button>
                <button class="btn btn-outline" @click="clearAddFields">🗑️ مسح الكل</button>
            </div>
            <div style="margin-top:6px; color:#64748b; font-size:11px; text-align:center;">
                ⬅️ أدخل الأسماء والكميات ثم اضغط "إضافة الكل"
                <span v-if="selectedSheet !== 'all'">(سيتم الإضافة في: <strong>{{ selectedSheet }}</strong>)</span>
                <span v-else>(سيتم الإضافة في: <strong>Sheet1</strong>)</span>
            </div>
        </div>

        <!-- ===== قسم السحب - 16 حقلاً ===== -->
        <div id="withdrawSection" class="section-box">
            <div class="section-header">
                <h3>➖ سحب 16 مادة دفعة واحدة</h3>
                <button class="close-section" @click="closeAllSections">✕</button>
            </div>
            <div class="multi-fields">
                <div v-for="i in 16" :key="'withdraw_' + i" class="field-item">
                    <label>{{ i }}.</label>
                    <input type="text" class="name-input" :placeholder="'مادة ' + i" v-model="withdrawItems[i-1].name">
                    <input type="text" class="qty-input" placeholder="الكمية" v-model="withdrawItems[i-1].quantity"
                           @input="validateDecimal($event, 'withdraw', i-1)">
                </div>
            </div>
            <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:6px;">
                <button class="btn btn-danger btn-lg" @click="withdrawMultipleItems" :disabled="saving">
                    {{ saving ? 'جاري السحب...' : '➖ سحب الكل' }}
                </button>
                <button class="btn btn-outline" @click="clearWithdrawFields">🗑️ مسح الكل</button>
            </div>
            <div style="margin-top:6px; color:#64748b; font-size:11px; text-align:center;">
                ⬅️ أدخل الأسماء والكميات ثم اضغط "سحب الكل"
                <span v-if="selectedSheet !== 'all'">(من: <strong>{{ selectedSheet }}</strong>)</span>
                <span v-else>(من: <strong>Sheet1</strong>)</span>
            </div>
        </div>

        <div class="footer-actions">
            <div class="left-actions">
                <button class="btn btn-outline" @click="refreshData" :disabled="loading">🔄 تحديث</button>
            </div>
            <div style="font-size:11px; color:#94a3b8;">آخر تحديث: {{ lastUpdate }}</div>
        </div>

        <div class="footer-text">
            <span class="heart"></span> تصميم دريد العيثاوي <span class="heart"></span>
        </div>
    </template>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
<script>
new Vue({
    el: '#app',
    data: {
        items: [],
        searchTerm: '',
        loading: true,
        saving: false,
        apiStatus: 'connecting',
        selectedSheet: 'all',
        lastUpdate: '--',
        showLogoPlaceholder: false,
        
        addItems: Array.from({length: 16}, () => ({ name: '', quantity: '' })),
        withdrawItems: Array.from({length: 16}, () => ({ name: '', quantity: '' })),
        
        apiUrl: 'https://script.google.com/macros/s/AKfycbzC6wJkaqcx2oBZKAi9j8QQKh6b4L8YkyZOMpuPrIhXC-rgf7kEr2CYX7q97CNTrjlu/exec'
    },
    computed: {
        statusText() {
            return {
                online: '🟢 متصل',
                offline: '🔴 غير متصل',
                connecting: '🟡 جاري الاتصال...'
            }[this.apiStatus] || '🔄 جاري...';
        },
        statusClass() {
            return {
                online: 'online',
                offline: 'offline',
                connecting: 'connecting'
            }[this.apiStatus] || 'connecting';
        },
        filteredItems() {
            if (!this.searchTerm.trim()) return this.items;
            const term = this.searchTerm.trim().toLowerCase();
            return this.items.filter(item => item.name.toLowerCase().includes(term));
        },
        totalUnits() {
            return this.filteredItems.reduce((sum, item) => sum + (item.quantity || 0), 0);
        }
    },
    methods: {
        getQuantityClass(quantity) {
            const qty = Number(quantity) || 0;
            if (qty <= 75) return 'badge-red';
            if (qty <= 150) return 'badge-yellow';
            if (qty <= 200) return 'badge-green';
            return 'badge-blue';
        },
        
        validateDecimal(event, type, index) {
            let value = event.target.value;
            value = value.replace(/[^0-9.]/g, '');
            const parts = value.split('.');
            if (parts.length > 2) {
                value = parts[0] + '.' + parts.slice(1).join('');
            }
            event.target.value = value;
            
            if (type === 'add') {
                this.addItems[index].quantity = value;
            } else {
                this.withdrawItems[index].quantity = value;
            }
        },
        
        closeAllSections() {
            document.querySelectorAll('.section-box').forEach(el => {
                el.classList.remove('active');
            });
        },
        
        showSearch() {
            this.closeAllSections();
            document.getElementById('searchSection').classList.add('active');
            document.getElementById('searchSection').scrollIntoView({ behavior: 'smooth' });
        },
        
        showAdd() {
            this.closeAllSections();
            document.getElementById('addSection').classList.add('active');
            document.getElementById('addSection').scrollIntoView({ behavior: 'smooth' });
        },
        
        showWithdraw() {
            this.closeAllSections();
            document.getElementById('withdrawSection').classList.add('active');
            document.getElementById('withdrawSection').scrollIntoView({ behavior: 'smooth' });
        },
        
        async loadItems() {
            this.loading = true;
            this.apiStatus = 'connecting';
            
            try {
                let url = this.apiUrl + '?action=getItems';
                if (this.selectedSheet && this.selectedSheet !== 'all') {
                    url += '&sheet=' + encodeURIComponent(this.selectedSheet);
                }
                
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 15000);
                
                const response = await fetch(url, { 
                    signal: controller.signal,
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });
                
                clearTimeout(timeout);
                
                if (!response.ok) {
                    throw new Error('خطأ في الاستجابة: ' + response.status);
                }
                
                const data = await response.json();
                
                if (data && data.success && data.items && Array.isArray(data.items)) {
                    this.items = data.items;
                    this.apiStatus = 'online';
                    this.lastUpdate = new Date().toLocaleTimeString('ar-EG');
                    this.showToast('✅ تم تحميل ' + this.items.length + ' مادة', 'success');
                    this._saveToLocal();
                } else {
                    throw new Error(data?.error || 'بيانات غير صالحة');
                }
            } catch (error) {
                console.error('❌ خطأ في التحميل:', error);
                this.apiStatus = 'offline';
                
                let errorMsg = '❌ فشل الاتصال بقاعدة البيانات';
                if (error.name === 'AbortError') {
                    errorMsg = '⏰ انتهت مهلة الاتصال';
                } else if (error.message) {
                    errorMsg = '❌ ' + error.message;
                }
                this.showToast(errorMsg, 'error');
                this._loadFromLocal();
            } finally {
                this.loading = false;
            }
        },
        
        refreshData() {
            this.loadItems();
        },
        
        async _sendRequest(action, params = {}) {
            try {
                let url = this.apiUrl + '?action=' + encodeURIComponent(action);
                
                for (const key in params) {
                    if (params[key] !== undefined && params[key] !== null && params[key] !== '') {
                        url += '&' + encodeURIComponent(key) + '=' + encodeURIComponent(params[key]);
                    }
                }
                
                if (this.selectedSheet && this.selectedSheet !== 'all') {
                    url += '&sheet=' + encodeURIComponent(this.selectedSheet);
                }
                
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 10000);
                
                const response = await fetch(url, { 
                    signal: controller.signal,
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });
                
                clearTimeout(timeout);
                
                if (!response.ok) {
                    throw new Error('خطأ في الاستجابة: ' + response.status);
                }
                
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('❌ خطأ في الطلب:', error);
                if (error.name === 'AbortError') {
                    throw new Error('انتهت مهلة الاتصال');
                }
                throw error;
            }
        },
        
        async editItem(item) {
            const newName = prompt('✏️ تعديل اسم المادة:', item.name)?.trim() || item.name;
            const newQtyInput = prompt('✏️ تعديل العدد:', item.quantity);
            if (newQtyInput === null) return;
            const newQty = parseFloat(newQtyInput);
            if (isNaN(newQty) || newQty < 0) {
                this.showToast('⚠️ العدد غير صحيح', 'error');
                return;
            }
            
            this.saving = true;
            try {
                const data = await this._sendRequest('updateItem', { 
                    id: item.id, 
                    name: newName, 
                    quantity: newQty
                });
                
                if (data && data.success) {
                    this.showToast('✅ ' + (data.message || 'تم التعديل بنجاح'), 'success');
                    await this.loadItems();
                } else {
                    this.showToast('❌ ' + (data?.error || 'فشل التعديل'), 'error');
                }
            } catch (error) {
                this.showToast('❌ خطأ: ' + error.message, 'error');
            } finally {
                this.saving = false;
            }
        },
        
        async deleteItem(item) {
            if (!confirm('⚠️ هل أنت متأكد من حذف "' + item.name + '"؟')) return;
            
            this.saving = true;
            try {
                const data = await this._sendRequest('deleteItem', { 
                    id: item.id
                });
                
                if (data && data.success) {
                    this.showToast('✅ ' + (data.message || 'تم الحذف بنجاح'), 'success');
                    await this.loadItems();
                } else {
                    this.showToast('❌ ' + (data?.error || 'فشل الحذف'), 'error');
                }
            } catch (error) {
                this.showToast('❌ خطأ: ' + error.message, 'error');
            } finally {
                this.saving = false;
            }
        },
        
        async addMultipleItems() {
            const itemsToAdd = this.addItems
                .filter(item => item.name && item.name.trim())
                .map(item => {
                    const qty = parseFloat(String(item.quantity).replace(/[^0-9.]/g, ''));
                    return { 
                        name: item.name.trim(), 
                        quantity: isNaN(qty) ? 0 : qty
                    };
                })
                .filter(item => item.quantity > 0);
            
            if (itemsToAdd.length === 0) {
                this.showToast('⚠️ يرجى إدخال مادة واحدة على الأقل بكمية صحيحة', 'error');
                return;
            }
            
            this.saving = true;
            let successCount = 0;
            let errorCount = 0;
            let errors = [];
            
            for (const item of itemsToAdd) {
                try {
                    const data = await this._sendRequest('addItem', { 
                        name: item.name, 
                        quantity: item.quantity
                    });
                    
                    if (data && data.success) {
                        successCount++;
                    } else {
                        errorCount++;
                        errors.push(item.name + ': ' + (data?.error || 'فشل غير معروف'));
                    }
                } catch (error) {
                    errorCount++;
                    errors.push(item.name + ': ' + error.message);
                }
            }
            
            this.clearAddFields();
            await this.loadItems();
            this.saving = false;
            
            if (successCount > 0 && errorCount === 0) {
                this.showToast('✅ تم إضافة ' + successCount + ' مواد بنجاح', 'success');
            } else if (successCount > 0 && errorCount > 0) {
                this.showToast('⚠️ تم إضافة ' + successCount + ' مواد، فشل ' + errorCount, 'error');
                console.error('❌ الأخطاء:', errors.join('\n'));
            } else {
                this.showToast('❌ فشل إضافة جميع المواد', 'error');
                console.error('❌ الأخطاء:', errors.join('\n'));
            }
        },
        
        async withdrawMultipleItems() {
            const itemsToWithdraw = this.withdrawItems
                .filter(item => item.name && item.name.trim())
                .map(item => {
                    const qty = parseFloat(String(item.quantity).replace(/[^0-9.]/g, ''));
                    return { 
                        name: item.name.trim(), 
                        quantity: isNaN(qty) ? 0 : qty
                    };
                })
                .filter(item => item.quantity > 0);
            
            if (itemsToWithdraw.length === 0) {
                this.showToast('⚠️ يرجى إدخال مادة واحدة على الأقل بكمية صحيحة', 'error');
                return;
            }
            
            let insufficientItems = [];
            for (const item of itemsToWithdraw) {
                const existing = this.items.find(i => 
                    i.name.toLowerCase() === item.name.toLowerCase()
                );
                const available = existing ? existing.quantity : 0;
                if (available < item.quantity - 0.001) {
                    insufficientItems.push({
                        name: item.name,
                        available: available,
                        requested: item.quantity
                    });
                }
            }
            
            if (insufficientItems.length > 0) {
                let msg = '⚠️ لا يمكن سحب المواد التالية:\n';
                insufficientItems.forEach(item => {
                    msg += '- ' + item.name + ': المطلوب ' + item.requested.toFixed(2) + '، المتوفر ' + item.available.toFixed(2) + '\n';
                });
                this.showToast(msg, 'error');
                return;
            }
            
            this.saving = true;
            let successCount = 0;
            let errorCount = 0;
            let errors = [];
            
            for (const item of itemsToWithdraw) {
                try {
                    const data = await this._sendRequest('withdrawItem', { 
                        name: item.name, 
                        quantity: item.quantity
                    });
                    
                    if (data && data.success) {
                        successCount++;
                    } else {
                        errorCount++;
                        errors.push(item.name + ': ' + (data?.error || 'فشل غير معروف'));
                    }
                } catch (error) {
                    errorCount++;
                    errors.push(item.name + ': ' + error.message);
                }
            }
            
            this.clearWithdrawFields();
            await this.loadItems();
            this.saving = false;
            
            if (successCount > 0 && errorCount === 0) {
                this.showToast('✅ تم سحب ' + successCount + ' مواد بنجاح', 'success');
            } else if (successCount > 0 && errorCount > 0) {
                this.showToast('⚠️ تم سحب ' + successCount + ' مواد، فشل ' + errorCount, 'error');
                console.error('❌ الأخطاء:', errors.join('\n'));
            } else {
                this.showToast('❌ فشل سحب جميع المواد', 'error');
                console.error('❌ الأخطاء:', errors.join('\n'));
            }
        },
        
        clearAddFields() {
            this.addItems = Array.from({length: 16}, () => ({ name: '', quantity: '' }));
        },
        clearWithdrawFields() {
            this.withdrawItems = Array.from({length: 16}, () => ({ name: '', quantity: '' }));
        },
        
        searchItems() {
            if (this.searchTerm.trim()) {
                this.showToast('🔍 تم البحث عن: "' + this.searchTerm + '"', 'success');
            }
        },
        clearSearch() {
            this.searchTerm = '';
            this.showToast('🧹 تم إلغاء البحث', 'success');
        },
        
        _saveToLocal() {
            try { 
                localStorage.setItem('inventoryBackup', JSON.stringify(this.items));
                localStorage.setItem('inventoryLastUpdate', this.lastUpdate);
            } catch (e) {}
        },
        _loadFromLocal() {
            try {
                const stored = localStorage.getItem('inventoryBackup');
                if (stored) {
                    this.items = JSON.parse(stored);
                    const lastUpdate = localStorage.getItem('inventoryLastUpdate');
                    this.lastUpdate = lastUpdate || 'من النسخة الاحتياطية';
                    this.showToast('📂 تم تحميل البيانات من النسخة الاحتياطية', 'success');
                }
            } catch (e) {}
        },
        
        showToast(msg, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast';
            if (type) toast.classList.add(type);
            toast.classList.add('show');
            clearTimeout(this.toastTimer);
            this.toastTimer = setTimeout(() => toast.classList.remove('show'), 5000);
        }
    },
    mounted() {
        this.loadItems();
    }
});
</script>
</body>
</html>
